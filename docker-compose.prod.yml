services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - FRONTEND_URL=https://research.hopeyuanxu.com
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=https://research.hopeyuanxu.com/api/auth/google-drive/callback
    volumes:
      - ./backend/db.sqlite3:/backend/db.sqlite3
      - ./backend/projects:/backend/projects
      - ./backend/images:/backend/images
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=https://research.hopeyuanxu.com
    environment:
      - NEXT_PUBLIC_API_URL=https://research.hopeyuanxu.com
    restart: unless-stopped
