services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - FRONTEND_URL=https://research.arklab-hkustgz.com
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-ResearchBuddy}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-true}
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_PORT=${IMAP_PORT:-993}
      - FEEDBACK_NOTIFICATION_EMAIL=${FEEDBACK_NOTIFICATION_EMAIL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=https://research.arklab-hkustgz.com/api/auth/google-drive/callback
    volumes:
      - ./backend/db.sqlite3:/backend/db.sqlite3
      - ./backend/projects:/backend/projects
      - ./backend/images:/backend/images
      - ./docs:/docs:ro
      - ./project-template:/project-template:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=https://research.arklab-hkustgz.com
    environment:
      - NEXT_PUBLIC_API_URL=https://research.arklab-hkustgz.com
    restart: unless-stopped
